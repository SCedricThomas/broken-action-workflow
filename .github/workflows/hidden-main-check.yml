name: Hidden Main Check

on:
  workflow_run:
    workflows:
      - Required CI
    types:
      - completed

permissions:
  actions: read
  checks: write
  contents: read

jobs:
  hidden-main-check:
    if: ${{ github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Create a synthetic failed check run on marked main commits
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '[trigger-hidden-fail]';
            const headSha = context.payload.workflow_run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: commit } = await github.rest.repos.getCommit({
              owner,
              repo,
              ref: headSha,
            });

            const message = commit.commit.message || '';
            if (!message.includes(marker)) {
              core.info(`No marker found on ${headSha}, skipping synthetic failure.`);
              return;
            }

            core.info(`Marker found on ${headSha}, creating a failed 'automerge' check run.`);
            await github.rest.checks.create({
              owner,
              repo,
              name: 'automerge',
              head_sha: headSha,
              status: 'completed',
              conclusion: 'failure',
              output: {
                title: 'Synthetic main-side failure',
                summary: 'This check run intentionally fails after Required CI succeeds on main.',
              },
            });

