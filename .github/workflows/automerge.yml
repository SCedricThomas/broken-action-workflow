name: Auto Merge

on:
  push:
    branches:
      - main

jobs:
  automerge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail only when the merged commit message carries the repro marker
        run: |
          if git log -1 --pretty=%B | grep -q '\[trigger-hidden-fail\]'; then
            echo "Reproducing hidden auxiliary check failure"
            exit 1
          fi
          echo "No repro marker found, automerge check passes"
